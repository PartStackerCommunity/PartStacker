on:
  workflow_dispatch:

jobs:

  build-macos:
    runs-on: macos-15
    strategy:
      matrix:
        include:
          - triplet: x64-osx
            arch: x86_64
          - triplet: arm64-osx
            arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: |
            build/
            external/vcpkg/
          key: macos-vcpkg-repro

      - name: Select Xcode version
        run: sudo xcode-select -switch /Applications/Xcode_16.3.app
        shell: bash

      - name: Configure PartStacker
        run: |
          cmake --preset Debug \
                -G Xcode \
                -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
                -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
                -DCMAKE_OSX_DEPLOYMENT_TARGET=11.6
        shell: bash

      - name: Build PartStacker
        run: |
          cmake --build build --target minimal-vcpkg-repro
        shell: bash
